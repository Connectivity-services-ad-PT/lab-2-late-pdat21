openapi: 3.1.0

info:
  title: Smart Campus AI Vision API (Pair 02)
  version: 1.0.0
  description: Camera AI Vision contract for analysis and detection
  contact:
    name: FIT4110 Lab
    email: student@fit4110.local

tags:
  - name: System
    description: System health APIs
  - name: Vision
    description: AI Vision processing APIs
  - name: Detection
    description: Detection management APIs
  - name: Alert
    description: Alert management APIs
  - name: Event
    description: Event stream APIs

servers:
  - url: http://localhost:4010

paths:

  /health:
    get:
      tags:
        - System
      operationId: healthCheck
      description: Check system health status
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /frames/analyze:
    post:
      tags:
        - Vision
      operationId: analyzeFrame
      description: Analyze camera frame and detect objects
      summary: Analyze frame
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FrameRequest"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"

  /detections:
    get:
      tags:
        - Detection
      operationId: getDetections
      description: Get all detections
      summary: List detections
      responses:
        "200":
          description: Detection list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Detection"

  /detections/{id}:
    get:
      tags:
        - Detection
      operationId: getDetectionById
      description: Get detection by ID
      summary: Detection detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Detection detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Detection"

  /alerts:
    get:
      tags:
        - Alert
      operationId: getAlerts
      description: Get alert list
      summary: List alerts
      responses:
        "200":
          description: Alerts list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /events:
    get:
      tags:
        - Event
      operationId: getEvents
      description: Get event stream (Detection + Alert)
      summary: Event stream
      responses:
        "200":
          description: Events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"

components:

  schemas:

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok

    FrameRequest:
      type: object
      required:
        - cameraId
        - timestamp
      properties:
        cameraId:
          type: string
        timestamp:
          type: string
          format: date-time
        imageUrl:
          type: [string, "null"]

    AnalysisResult:
      type: object
      properties:
        frameId:
          type: string
        objects:
          type: array
          items:
            type: string
        confidence:
          type: number
        metadata:
          type: [object, "null"]

    Detection:
      type: object
      required:
        - id
        - type
        - severity
      properties:
        id:
          type: string
        type:
          type: string
        location:
          type: string
        severity:
          type: string
          enum: [low, medium, high]

    Alert:
      type: object
      required:
        - id
        - message
        - level
      properties:
        id:
          type: string
        message:
          type: string
        level:
          type: string
          enum: [info, warning, critical]

    Event:
      oneOf:
        - $ref: "#/components/schemas/Detection"
        - $ref: "#/components/schemas/Alert"
      discriminator:
        propertyName: type
        mapping:
          detection: "#/components/schemas/Detection"
          alert: "#/components/schemas/Alert"